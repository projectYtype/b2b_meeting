    // ---------------------------------------------------------
    // 공용 유틸리티 & 컴포넌트

    const generateTimeSlots = (config) => {
      if (!config || !config.dates || !config.dates.length) return [];
      const parseTime = (str) => { const [h, m] = (str||"00:00").split(':').map(Number); return h * 60 + m; };
      const formatTime = (mins) => `${String(Math.floor(mins / 60)).padStart(2, '0')}:${String(mins % 60).padStart(2, '0')}`;
      let slots = [];
      let curr = parseTime(config.startTime);
      let lunchS = parseTime(config.lunchStart);
      let lunchE = parseTime(config.lunchEnd);
      for (let i = 0; i < (config.sessionsPerDay || 10); i++) {
        if (curr >= lunchS && curr < lunchE) curr = lunchE;
        let end = curr + (config.sessionLength || 30);
        if (curr < lunchS && end > lunchS) { curr = lunchE; end = curr + (config.sessionLength || 30); }
        slots.push({ value: `${formatTime(curr)}~${formatTime(end)}` });
        curr = end;
      }
      return slots;
    };

        case 'canceled':    return { label: '취소', color: 'bg-red-100 text-red-700' };
        default:            return { label: '대기', color: 'bg-gray-100 text-gray-500' };

   // =========================================================================
    // 1. 매칭 현황판 (StatusBoardApp) - View Only + Excel Export
    // =========================================================================
    function StatusBoardApp({ eventData, onBack, onHome, setSelectedMenu }) {
      const [statsViewMode, setStatsViewMode] = useState('buyer'); 
      const [statsDayIdx, setStatsDayIdx] = useState('all'); 
      const [modal, setModal] = useState({ isOpen: false, data: null, type: '' });

      const config = eventData?.config || {};
      const dates = config.dates || [];
      const companies = eventData?.companies || [];
      const buyers = eventData?.buyers || [];
      const matches = eventData?.matches || {};
      const liveStatus = eventData?.liveStatus || {}; 
      const onsiteMarks = eventData?.onsiteMarks || {};
      
      const timeSlots = useMemo(() => {
        return generateTimeSlots(config);
      }, [config]);

      const companyMap = useMemo(() => companies.reduce((acc, c) => { acc[c.id] = c; return acc; }, {}), [companies]);
      const buyerMap = useMemo(() => buyers.reduce((acc, b) => { acc[b.id] = b; return acc; }, {}), [buyers]);

      const reverseMatchMap = useMemo(() => {

            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

              const cellVal = (headerRow[col] || '').toString().trim();
              if (/\d{1,2}:\d{2}\s*~\s*\d{1,2}:\d{2}/.test(cellVal)) {
                const cleanTime = cellVal.replace(/\s/g, ''); 
                timeColMap[col] = cleanTime;
                if (!newEv.matches[dayIdx][cleanTime]) {
                  newEv.matches[dayIdx][cleanTime] = {};
                }
              }

            }

            let failCount = 0;

              if (!buyerName) continue;

                (b.name || '').replace(/\s+/g, '') === buyerName
              );

              for (const col in timeColMap) {

      const executeGlobalAutoMatch = (mode) => {
        alert('매칭 데이터를 계산하고 있습니다. 확인을 누르시고 1~2초만 기다려주세요.');
        const newEv = JSON.parse(JSON.stringify(eventData));
        let newMatches = newEv.matches || { 0: {} };
        const localDays = config.dates?.length || 1;

        const getBuyerAvailableDays = (b) => {
            if (!b.availableDaysText || !b.availableDaysText.trim()) return Array.from({length: localDays}, (_, i) => i);
            const days = b.availableDaysText.split(',').map(s => parseInt(s.trim()) - 1).filter(n => !isNaN(n) && n >= 0 && n < localDays);
            return days.length > 0 ? days : Array.from({length: localDays}, (_, i) => i);
        };

        const getTargetSlots = (availableDays) => {
            let allSlots = [];
            availableDays.forEach(d => { timeSlots.forEach(slot => { allSlots.push({ d, timeVal: slot.value }); }); });
            if (mode === 'spread') {
              for (let i = allSlots.length - 1; i > 0; i--) {
                  const j = Math.floor(Math.random() * (i + 1));
                  [allSlots[i], allSlots[j]] = [allSlots[j], allSlots[i]];
              }
            }
            return allSlots;
        };

        const getBuyerMatchCountLocal = (bId) => {
            let count = 0;
            for (let d = 0; d < localDays; d++) {
              for (let slot of timeSlots) {
                const tM = newMatches[d]?.[slot.value] || {};
                if (Object.values(tM).includes(bId)) count++;
              }
            }
            return count;
        };

        const isMatchedWith = (bId, cId) => {
            for (let d = 0; d < localDays; d++) {
              for (let slot of timeSlots) {
                if (newMatches[d]?.[slot.value]?.[cId] === bId) return true;
              }
            }
            return false;
        };

        const assignSlot = (bId, cId, availableDays) => {
          if (isMatchedWith(bId, cId)) return false; 
          const slots = getTargetSlots(availableDays);
          for (let {d, timeVal} of slots) {
            if (!newMatches[d]) newMatches[d] = {};
            if (!newMatches[d][timeVal]) newMatches[d][timeVal] = {};
            const tM = newMatches[d][timeVal];
            if (!tM[cId] && !Object.values(tM).includes(bId)) {
                newMatches[d][timeVal][cId] = bId;
                return true;
            }
          }
          return false;
        };

        buyers.forEach(buyer => {
          const availableDays = getBuyerAvailableDays(buyer);
          const desiredNames = (buyer.desiredCompaniesText || '').split(',').map(s=>s.trim()).filter(Boolean);
          const desiredIds = [];
          
          desiredNames.forEach(name => {
              const c = companies.find(comp => comp.name.toLowerCase().includes(name.toLowerCase()));
              if (c && !desiredIds.includes(c.id)) desiredIds.push(c.id);
          });

          desiredIds.forEach(cId => { assignSlot(buyer.id, cId, availableDays); });

          let currentCount = getBuyerMatchCountLocal(buyer.id);
          const minMatches = config.minMatches !== undefined ? config.minMatches : 3;
          
          if (currentCount < minMatches) {
              let availableCompanies = companies.filter(c => {
                if (isMatchedWith(buyer.id, c.id)) return false;
                if (buyer.field && c.field && buyer.field !== c.field) return false;
                return true;
              });
              
              availableCompanies.sort((a, b) => {
                const scoreA = (buyer.field && a.field === buyer.field) ? 1 : 0;
                const scoreB = (buyer.field && b.field === buyer.field) ? 1 : 0;
                if (scoreA !== scoreB) return scoreB - scoreA;
                return Math.random() - 0.5; 
              });

              for (let comp of availableCompanies) {
                if (currentCount >= minMatches) break; 
                if (assignSlot(buyer.id, comp.id, availableDays)) { currentCount++; }
              }
          }
        });

        newEv.matches = newMatches;
        newEv.lastModified = Date.now();
        saveEventData(newEv);
        setTimeout(() => alert('자동 배정이 성공적으로 완료되었습니다!'), 500);
      };

              delete newEv.matches[dayIdx][timeSlot][cId];
           }
        } else {
           if (cId) {
              const oldCId = Object.keys(newEv.matches[dayIdx][timeSlot]).find(k => newEv.matches[dayIdx][timeSlot][k] === bId);
              if (oldCId) delete newEv.matches[dayIdx][timeSlot][oldCId];
              newEv.matches[dayIdx][timeSlot][cId] = bId;
           } else {
              const targetCId = Object.keys(newEv.matches[dayIdx][timeSlot]).find(k => newEv.matches[dayIdx][timeSlot][k] === bId);
              actualCId = targetCId;
              if (targetCId) delete newEv.matches[dayIdx][timeSlot][targetCId];
           }
        }

        if (!newEv.tableAllocations) newEv.tableAllocations = {};
        if (newEv.tableAllocations[dayIdx]?.[timeSlot]?.[actualBId]) {
          delete newEv.tableAllocations[dayIdx][timeSlot][actualBId];
        }

        if (isEditMarkMode) {
          if (!newEv.modifiedMarks) newEv.modifiedMarks = { cells: {}, buyers: {} };
          if (!newEv.modifiedMarks.cells) newEv.modifiedMarks.cells = {};
          if (!newEv.modifiedMarks.cells[dayIdx]) newEv.modifiedMarks.cells[dayIdx] = {};
          if (!newEv.modifiedMarks.cells[dayIdx][timeSlot]) newEv.modifiedMarks.cells[dayIdx][timeSlot] = {};

          if (bId && cId) {
            newEv.modifiedMarks.cells[dayIdx][timeSlot][actualBId] = true;
          } else {
            delete newEv.modifiedMarks.cells[dayIdx][timeSlot][actualBId];
          }
        }
        
        newEv.lastModified = Date.now();
        saveEventData(newEv);
      };

      const shuffleArray = (array) => {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
          randomIndex = Math.floor(Math.random() * currentIndex);
          currentIndex--;
          [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
      };

      const handleAutoAssignTables = () => {
        const numTables = parseInt(tableCountInput, 10);
        if (isNaN(numTables) || numTables < 1) return alert("올바른 테이블 개수를 숫자로 입력하세요.");
        
        let newAllocations = {}; 
        let tableUsage = {};     

        let buyerMeetings = {};
        buyers.forEach(b => buyerMeetings[b.id] = []);

        Object.keys(matches).forEach(dayIdx => {
          Object.keys(matches[dayIdx] || {}).forEach(timeSlot => {
            const timeMatches = matches[dayIdx][timeSlot];
            Object.keys(timeMatches || {}).forEach(companyId => {
              const buyerId = timeMatches[companyId];
              if (buyerMeetings[buyerId]) buyerMeetings[buyerId].push({ dayIdx, timeSlot, companyId });
            });
          });
        });

        const sortedBuyers = Object.keys(buyerMeetings).sort((a, b) => buyerMeetings[b].length - buyerMeetings[a].length);

        sortedBuyers.forEach(buyerId => {
          const meetings = buyerMeetings[buyerId];
          if (meetings.length === 0) return;

          let dedicatedTable = null;
          const randomizedTables = shuffleArray(Array.from({length: numTables}, (_, i) => i + 1));

          for (let t of randomizedTables) {
            let isFreeForAll = true;
            for (let m of meetings) {
              if (tableUsage[m.dayIdx]?.[m.timeSlot]?.[t]) { isFreeForAll = false; break; }
            }
            if (isFreeForAll) { dedicatedTable = t; break; }
          }

          if (dedicatedTable) {
            meetings.forEach(m => {
              if (!newAllocations[m.dayIdx]) newAllocations[m.dayIdx] = {};
              if (!newAllocations[m.dayIdx][m.timeSlot]) newAllocations[m.dayIdx][m.timeSlot] = {};
              newAllocations[m.dayIdx][m.timeSlot][buyerId] = dedicatedTable;
              if (!tableUsage[m.dayIdx]) tableUsage[m.dayIdx] = {};
              if (!tableUsage[m.dayIdx][m.timeSlot]) tableUsage[m.dayIdx][m.timeSlot] = {};
              tableUsage[m.dayIdx][m.timeSlot][dedicatedTable] = true;
            });
          } else {
            meetings.forEach(m => {
              let assigned = false;
              const randomTablesForMeeting = shuffleArray(Array.from({length: numTables}, (_, i) => i + 1));
              for (let t of randomTablesForMeeting) {
                if (!tableUsage[m.dayIdx]?.[m.timeSlot]?.[t]) {
                  if (!newAllocations[m.dayIdx]) newAllocations[m.dayIdx] = {};
                  if (!newAllocations[m.dayIdx][m.timeSlot]) newAllocations[m.dayIdx][m.timeSlot] = {};
                  newAllocations[m.dayIdx][m.timeSlot][buyerId] = t;
                  if (!tableUsage[m.dayIdx]) tableUsage[m.dayIdx] = {};
                  if (!tableUsage[m.dayIdx][m.timeSlot]) tableUsage[m.dayIdx][m.timeSlot] = {};
                  tableUsage[m.dayIdx][m.timeSlot][t] = true;
                  assigned = true;
                  break;
                }
              }
              if (!assigned) {
                if (!newAllocations[m.dayIdx]) newAllocations[m.dayIdx] = {};
                if (!newAllocations[m.dayIdx][m.timeSlot]) newAllocations[m.dayIdx][m.timeSlot] = {};
                newAllocations[m.dayIdx][m.timeSlot][buyerId] = '초과';
              }
            });
          }
        });

        const newEv = JSON.parse(JSON.stringify(eventData));
        newEv.tableAllocations = newAllocations;
        newEv.lastModified = Date.now();
        saveEventData(newEv);
        alert('테이블 자동 배치가 완료되었습니다.');
      };

// 🧹 더미 데이터 (고스트) 청소기

          XLSX.writeFile(wb, `B2B_Mailing_Data_${getToday()}.xlsx`);

          newEv.mailConfig = mailConfig;
          newEv.lastModified = Date.now();
          saveEventData(newEv);
          
          alert('자동 메일링용 엑셀 파일이 성공적으로 다운로드되었습니다.');

      // ====================================================================================
      // 검색 가능한 드롭다운 컴포넌트 (매칭표 내부용)
      // ====================================================================================
      const SearchableDropdown = ({ value, onChange, options, isMarked, className, item, scheduleEditMode, dIdx, slot, matches, timeMatches, assignedTable }) => {
        const [isOpen, setIsOpen] = useState(false);
        const [search, setSearch] = useState('');
        const [pos, setPos] = useState({ top: 0, left: 0, width: 0 });
        const wrapperRef = useRef(null);
        const dropdownRef = useRef(null);

        useEffect(() => {
          const handleClickOutside = (e) => {
            if (wrapperRef.current && wrapperRef.current.contains(e.target)) return;
            if (dropdownRef.current && dropdownRef.current.contains(e.target)) return;
            setIsOpen(false);
          };
          const handleScroll = (e) => {
            if (dropdownRef.current && dropdownRef.current.contains(e.target)) return;
            setIsOpen(false);
          };
          if (isOpen) {
            document.addEventListener('mousedown', handleClickOutside);
            document.addEventListener('scroll', handleScroll, true); 
          }
          return () => {
            document.removeEventListener('mousedown', handleClickOutside);
            document.removeEventListener('scroll', handleScroll, true);
          };
        }, [isOpen]);

        const handleOpen = (e) => {
          if (!isOpen) {
            const rect = wrapperRef.current.getBoundingClientRect();
            const spaceBelow = window.innerHeight - rect.bottom;
            // 화면 아래 공간이 350px보다 적고, 위쪽 공간이 더 많으면 위로 열리게 설정
            const isUpwards = spaceBelow < 350 && rect.top > spaceBelow;
            
            setPos({ 
              top: isUpwards ? 'auto' : rect.bottom + 5, 
              bottom: isUpwards ? window.innerHeight - rect.top + 5 : 'auto',
              left: rect.left, 
              width: Math.max(rect.width, 280) 
            });
            setSearch('');
          }
          setIsOpen(!isOpen);
        };

        const getOptionState = (opt) => {
          let isBookedSameTime = false;
          let isAlreadyPaired = false;
          let pairedInfo = '';

          if (scheduleEditMode === 'company') isBookedSameTime = Object.values(timeMatches).includes(opt.id) && value !== opt.id;
          else isBookedSameTime = timeMatches[opt.id] && value !== opt.id;

          Object.keys(matches).forEach(day => {
            Object.keys(matches[day] || {}).forEach(time => {
              if (day == dIdx && time === slot.value) return;
              const tMatches = matches[day][time];
              if (scheduleEditMode === 'company') {
                if (tMatches[item.id] === opt.id) { isAlreadyPaired = true; pairedInfo = `${Number(day)+1}일차 ${time}`; }
              } else {
                if (tMatches[opt.id] === item.id) { isAlreadyPaired = true; pairedInfo = `${Number(day)+1}일차 ${time}`; }
              }
            });
          });

          let isDisabled = isBookedSameTime; 
          let disableReason = '';
          if (isBookedSameTime) disableReason = '해당 시간에 다른 미팅이 있습니다';

          return { isDisabled, disableReason, isAlreadyPaired, pairedInfo };
        };

        const renderSelectedLabel = () => {
          if (!value) return ''; 
          const opt = options.find(o => o.id === value);
          if (!opt) return '';
          const modifyPrefix = isMarked ? '[수정] ' : '';
          const displayPrefix = assignedTable ? `[T${assignedTable}] ` : '';
          const textLabel = scheduleEditMode === 'company' ? `${opt.company} (${opt.name})` : `${opt.name} (${opt.booth})`;
          return `${modifyPrefix}${displayPrefix}${textLabel}`;
        };

        return (
          <>
            <div ref={wrapperRef} onClick={handleOpen} className={`${className} flex items-center justify-center cursor-pointer select-none bg-white`}>
              {value ? (
                <div className="flex justify-between items-center w-full">
                  <span className="truncate w-[90%] text-left">{renderSelectedLabel()}</span>
                  <span className="text-[10px] opacity-50 shrink-0">▼</span>
                </div>
              ) : (
                <span className="text-gray-300 hover:text-blue-500 font-black text-lg block text-center w-full leading-none transition-colors">+</span>
              )}
            </div>
            
            {isOpen && ReactDOM.createPortal(
              <div 
                ref={dropdownRef}
                className="fixed z-[99999] bg-white border border-gray-400 shadow-2xl rounded-lg flex flex-col" 
                style={{ top: pos.top, bottom: pos.bottom, left: pos.left, width: pos.width, maxHeight: '350px' }}
              >
                <div className="p-2 border-b bg-gray-100 sticky top-0 z-10 rounded-t-lg">
                  <input type="text" className="w-full p-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 font-bold bg-white" placeholder="🔍 이름 또는 소속 검색..." value={search} onChange={e => setSearch(e.target.value)} onClick={e => e.stopPropagation()} autoFocus />
                </div>
                <div className="overflow-y-auto custom-scrollbar flex-1 bg-white rounded-b-lg">
                  <div onClick={() => { onChange(''); setIsOpen(false); }} className="p-3 text-sm cursor-pointer hover:bg-red-50 hover:text-red-600 text-gray-700 font-bold border-b">
                    ✕ 미팅 삭제 (비우기)
                  </div>
                  {options.filter(opt => {
                    const textLabel = scheduleEditMode === 'company' ? `${opt.company} ${opt.name}` : `${opt.name} ${opt.booth}`;
                    return textLabel.toLowerCase().includes(search.toLowerCase());
                  }).map(opt => {
                    const { isDisabled, disableReason, isAlreadyPaired, pairedInfo } = getOptionState(opt);
                    const isCurrentlySelected = value === opt.id;
                    const textLabel = scheduleEditMode === 'company' ? `${opt.company} (${opt.name})` : `${opt.name} (${opt.booth})`;
                    
                    return (
                      <div
                        key={opt.id}
                        onClick={() => {
                          if (!isDisabled || isCurrentlySelected) {
                            onChange(opt.id);
                            setIsOpen(false);
                          }
                        }}
                        className={`p-2.5 text-sm border-b last:border-0 transition-colors flex flex-col ${isCurrentlySelected ? 'bg-indigo-100 text-indigo-800' : isDisabled ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'text-black cursor-pointer hover:bg-blue-50 hover:text-blue-700'}`}
                      >
                        <div className="font-bold flex justify-between items-center">
                          <span>{textLabel}</span>
                          {isDisabled && !isCurrentlySelected && <span className="text-[10px] px-1.5 py-0.5 bg-gray-300 text-gray-600 rounded">불가</span>}
                          {!isDisabled && isAlreadyPaired && !isCurrentlySelected && <span className="text-[10px] px-1.5 py-0.5 bg-blue-100 text-blue-600 border border-blue-200 rounded shadow-sm whitespace-nowrap">이동 ({pairedInfo})</span>}
                          {isCurrentlySelected && <span className="text-[10px] px-1.5 py-0.5 bg-indigo-500 text-white rounded shadow-sm">선택됨</span>}
                        </div>
                        {isDisabled && !isCurrentlySelected && (
                          <div className="text-[11px] text-red-500 mt-1 flex items-center">🚫 {disableReason}</div>
                        )}
                        {!isDisabled && isAlreadyPaired && !isCurrentlySelected && (
                          <div className="text-[11px] text-blue-500 mt-1 flex items-center">💡 선택 시 이 시간으로 스케줄이 이동됩니다.</div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>,
              document.body
            )}
          </>
        );
      };

// =========================================================================
    // 3. 현장 즉석 미팅 추가 앱 (OnsiteApp)
    // =========================================================================
    function OnsiteApp({ eventData, saveEventData, onBack, onHome, setSelectedMenu }) {
      const [currentDayIdx, setCurrentDayIdx] = useState(0);
      const [addModal, setAddModal] = useState({ isOpen: false, timeSlot: '', bId: '', cId: '' });
      const [statusModal, setStatusModal] = useState({ isOpen: false, timeSlot: '', bId: '', cId: '', currentStatus: '' });
      const [searchTerm, setSearchTerm] = useState(''); 
      const [detailModal, setDetailModal] = useState({ isOpen: false, data: null, type: '' });
      const [newCompany, setNewCompany] = useState({ isNew: false, name: '', phone: '' });

      const config = eventData?.config || {};
      const dates = config.dates || [];
      const companies = eventData?.companies || [];
      const buyers = eventData?.buyers || [];
      const matches = eventData?.matches || {};
      const liveStatus = eventData?.liveStatus || {};
      const meetingLogs = eventData?.meetingLogs || {}; 
      const buyerStatus = eventData?.buyerStatus || {};
      const onsiteMarks = eventData?.onsiteMarks || {};

      const companyMap = useMemo(() => companies.reduce((acc, c) => { acc[c.id] = c; return acc; }, {}), [companies]);
      const buyerMap = useMemo(() => buyers.reduce((acc, b) => { acc[b.id] = b; return acc; }, {}), [buyers]);

      const totalMeetingCount = useMemo(() => {
        let count = 0;
        Object.values(matches || {}).forEach(dayMatches => {
          Object.values(dayMatches || {}).forEach(timeMatches => {
            Object.entries(timeMatches || {}).forEach(([cId, bId]) => {
              if (companyMap[cId] && buyerMap[bId]) count++;
            });
          });
        });
        return count;
      }, [matches, companyMap, buyerMap]);

      const onsiteStats = useMemo(() => {
        let total = 0, inProg = 0, comp = 0;
        Object.keys(matches[currentDayIdx] || {}).forEach(time => {
          Object.entries(matches[currentDayIdx]?.[time] || {}).forEach(([cId, bId]) => {
            if (companyMap[cId] && buyerMap[bId]) {
              total++;
              const st = liveStatus[currentDayIdx]?.[time]?.[cId];
              if (st === 'in_progress') inProg++;
              if (st === 'completed') comp++;
            }
          });
        });
        return { total, inProg, comp };
      }, [matches, liveStatus, currentDayIdx, companyMap, buyerMap]);

      const timeSlots = useMemo(() => {
        return generateTimeSlots(config);
      }, [config]);

      const reverseMatchMap = useMemo(() => {
        const rMap = {};
        Object.keys(matches).forEach(dayIdx => {
          rMap[dayIdx] = {};
          Object.keys(matches[dayIdx] || {}).forEach(timeSlot => {
            rMap[dayIdx][timeSlot] = {};
            Object.entries(matches[dayIdx][timeSlot] || {}).forEach(([cId, bId]) => {
              rMap[dayIdx][timeSlot][bId] = cId;
            });
          });
        });
        return rMap;
      }, [matches]);

      const sortedBuyers = useMemo(() => {
        return [...buyers].sort((a, b) => {
          let aEarliest = 999;
          let bEarliest = 999;
          timeSlots.forEach((slot, idx) => {
            if (reverseMatchMap[currentDayIdx]?.[slot.value]?.[a.id] && aEarliest === 999) aEarliest = idx;
            if (reverseMatchMap[currentDayIdx]?.[slot.value]?.[b.id] && bEarliest === 999) bEarliest = idx;
          });
          if (aEarliest !== bEarliest) return aEarliest - bEarliest;
          return (a.company || '').localeCompare(b.company || '');
        });
      }, [buyers, timeSlots, reverseMatchMap, currentDayIdx]);

      const filteredBuyers = sortedBuyers.filter(b => {
        if (!searchTerm) return true;
        const lowerSearch = searchTerm.toLowerCase();
        
        if ((b.company || '').toLowerCase().includes(lowerSearch)) return true;
        if ((b.name || '').toLowerCase().includes(lowerSearch)) return true;
        
        let isMatchedWithCompany = false;
        timeSlots.forEach(slot => {
          const cId = reverseMatchMap[currentDayIdx]?.[slot.value]?.[b.id];
          if (cId) {
            const comp = companyMap[cId];
            if (comp) {
              if ((comp.name || '').toLowerCase().includes(lowerSearch)) isMatchedWithCompany = true;
              if ((comp.booth || '').toLowerCase().includes(lowerSearch)) isMatchedWithCompany = true;
            }
          }
        });
        
        return isMatchedWithCompany;
      });

      const toggleBuyerEntry = (buyerId) => {
        const newEv = JSON.parse(JSON.stringify(eventData));
        const dayKey = String(currentDayIdx);

        if (!newEv.buyerStatus) newEv.buyerStatus = {};
        if (!newEv.buyerStatus[dayKey]) newEv.buyerStatus[dayKey] = {};

        const currentStatus = newEv.buyerStatus[dayKey][buyerId] || 'waiting';
        let nextStatus = 'entered'; 

        if (currentStatus === 'waiting') nextStatus = 'entered';
        else if (currentStatus === 'entered') nextStatus = 'submitted'; 
        else if (currentStatus === 'submitted') nextStatus = 'waiting'; 

        newEv.buyerStatus[dayKey][buyerId] = nextStatus;
        newEv.lastModified = Date.now();
        saveEventData(newEv);
      };

      const handleSaveAdd = () => {
        const newEv = JSON.parse(JSON.stringify(eventData));
        let targetCId = addModal.cId;
        const existingMatches = newEv.matches?.[currentDayIdx]?.[addModal.timeSlot] || {};

        const isBuyerBooked = Object.values(existingMatches).includes(addModal.bId);
        if (isBuyerBooked) {
          return alert("해당 바이어는 선택하신 시간에 이미 다른 기업과 미팅이 배정되어 있습니다. 덮어씌울 수 없습니다.");
        }

        if (newCompany.isNew) {
          if (!newCompany.name.trim()) return alert("신규 기업명을 입력해주세요.");
          targetCId = `c_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
          if (!newEv.companies) newEv.companies = [];
          newEv.companies.push({
            id: targetCId,
            name: newCompany.name.trim(),
            booth: '현장추가',
            field: '',
            email: '',
            phone: newCompany.phone.trim()
          });
        } else {
          if (!targetCId) return alert("매칭할 국내 기업을 선택해주세요.");
          if (existingMatches[targetCId]) return alert("해당 국내 기업은 이 시간에 이미 다른 바이어와 미팅이 있습니다.");
        }

        if (!newEv.matches) newEv.matches = {};
        if (!newEv.matches[currentDayIdx]) newEv.matches[currentDayIdx] = {};
        if (!newEv.matches[currentDayIdx][addModal.timeSlot]) newEv.matches[currentDayIdx][addModal.timeSlot] = {};

        newEv.matches[currentDayIdx][addModal.timeSlot][targetCId] = addModal.bId;

        if (!newEv.onsiteMarks) newEv.onsiteMarks = {};
        if (!newEv.onsiteMarks[currentDayIdx]) newEv.onsiteMarks[currentDayIdx] = {};
        if (!newEv.onsiteMarks[currentDayIdx][addModal.timeSlot]) newEv.onsiteMarks[currentDayIdx][addModal.timeSlot] = {};
        newEv.onsiteMarks[currentDayIdx][addModal.timeSlot][targetCId] = true;

        newEv.lastModified = Date.now();
        saveEventData(newEv);
        setAddModal({ isOpen: false, timeSlot: '', bId: '', cId: '' });
        setNewCompany({ isNew: false, name: '', phone: '' });
      };

      const handleSaveStatus = (newStatus) => {
        const newEv = JSON.parse(JSON.stringify(eventData));
        const meetingKey = `${currentDayIdx}_${statusModal.timeSlot}_${statusModal.cId}`;
        
        if (!newEv.liveStatus) newEv.liveStatus = {};
        if (!newEv.liveStatus[currentDayIdx]) newEv.liveStatus[currentDayIdx] = {};
        if (!newEv.liveStatus[currentDayIdx][statusModal.timeSlot]) newEv.liveStatus[currentDayIdx][statusModal.timeSlot] = {};
        
        if (!newEv.meetingLogs) newEv.meetingLogs = {};

        if (newStatus === 'in_progress') {
          newEv.meetingLogs[meetingKey] = { startTime: Date.now() };
        } else if (newStatus === 'completed' && newEv.meetingLogs[meetingKey]?.startTime) {
          const durationMin = Math.round((Date.now() - newEv.meetingLogs[meetingKey].startTime) / 60000);
          newEv.meetingLogs[meetingKey].duration = Math.max(1, durationMin);
        }

        newEv.liveStatus[currentDayIdx][statusModal.timeSlot][statusModal.cId] = newStatus;
        newEv.lastModified = Date.now();
        saveEventData(newEv);
        setStatusModal({ isOpen: false, timeSlot: '', bId: '', cId: '', currentStatus: '' });
      };

      const handleCellClick = (slotValue, buyerId, cId, currentStatus) => {
        if (cId) setStatusModal({ isOpen: true, timeSlot: slotValue, bId: buyerId, cId: cId, currentStatus: currentStatus || 'waiting' });
        else setAddModal({ isOpen: true, timeSlot: slotValue, bId: buyerId, cId: '' });
      };

      const getStatusStyle = (status) => {
        switch(status) {
          case 'entered': return { label: '입장', color: 'bg-blue-100 text-blue-800 border-blue-300' };
          case 'in_progress': return { label: '진행', color: 'bg-green-100 text-green-800 border-green-300' };
          case 'completed': return { label: '완료', color: 'bg-gray-200 text-gray-600 border-gray-300' };
          case 'submitted': return { label: '제출', color: 'bg-teal-100 text-teal-800 border-teal-300' };
          case 'delayed': return { label: '연기', color: 'bg-orange-100 text-orange-800 border-orange-300' };
          case 'canceled': return { label: '취소', color: 'bg-red-100 text-red-800 border-red-300' };
          default: return { label: '대기', color: 'bg-white text-gray-800 border-gray-200 hover:bg-gray-50' };
        }
      };

      const now = new Date();
      const currentHHmm = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
      let currentSlotIdx = timeSlots.findIndex(s => {
        const [start, end] = s.value.split('~');
        return currentHHmm >= start && currentHHmm < end;
      });
      if (currentSlotIdx === -1) {
        currentSlotIdx = timeSlots.findIndex(s => s.value.split('~')[0] > currentHHmm);
      }
      const currentSlotValue = currentSlotIdx !== -1 ? timeSlots[currentSlotIdx].value : null;
      const nextSlotValue = currentSlotIdx !== -1 && currentSlotIdx + 1 < timeSlots.length ? timeSlots[currentSlotIdx + 1].value : null;

      const getColumnBg = (slotValue) => {
        if (slotValue === currentSlotValue) return 'bg-green-100 border-x-green-300 shadow-[inset_0_0_10px_rgba(0,0,0,0.02)]';
        if (slotValue === nextSlotValue) return 'bg-yellow-100 border-x-yellow-300 shadow-[inset_0_0_10px_rgba(0,0,0,0.02)]';
        return 'bg-white';
      };

      const OnsiteSearchDropdown = ({ value, onChange, options, timeMatches, bId, dIdx, slotValue, matches }) => {
        const [isOpen, setIsOpen] = useState(false);
        const [search, setSearch] = useState('');
        const [pos, setPos] = useState({ top: 0, left: 0, width: 0 });
        const wrapperRef = useRef(null);
        const dropdownRef = useRef(null);

        useEffect(() => {
          const handleClickOutside = (e) => {
            if (wrapperRef.current && wrapperRef.current.contains(e.target)) return;
            if (dropdownRef.current && dropdownRef.current.contains(e.target)) return;
            setIsOpen(false);
          };
          const handleScroll = (e) => {
            if (dropdownRef.current && dropdownRef.current.contains(e.target)) return;
            setIsOpen(false);
          };
          if (isOpen) {
            document.addEventListener('mousedown', handleClickOutside);
            document.addEventListener('scroll', handleScroll, true);
          }
          return () => {
            document.removeEventListener('mousedown', handleClickOutside);
            document.removeEventListener('scroll', handleScroll, true);
          };
        }, [isOpen]);

        const handleOpen = () => {
          if (!isOpen) {
            const rect = wrapperRef.current.getBoundingClientRect();
            const spaceBelow = window.innerHeight - rect.bottom;
            const isUpwards = spaceBelow < 350 && rect.top > spaceBelow;

            setPos({ 
              top: isUpwards ? 'auto' : rect.bottom + 5, 
              bottom: isUpwards ? window.innerHeight - rect.top + 5 : 'auto',
              left: rect.left, 
              width: Math.max(rect.width, 280) 
            });
            setSearch('');
          }
          setIsOpen(!isOpen);
        };

        const getOptionState = (opt) => {
          let isBookedSameTime = !!timeMatches[opt.id]; 
          let isAlreadyPaired = false;
          let pairedInfo = '';

          Object.keys(matches).forEach(day => {
            Object.keys(matches[day] || {}).forEach(time => {
              if (day == dIdx && time === slotValue) return; 
              if (matches[day][time][opt.id] === bId) {
                isAlreadyPaired = true;
                pairedInfo = `${Number(day)+1}일차 ${time}`;
              }
            });
          });

          let isDisabled = isBookedSameTime;
          let disableReason = '';
          if (isBookedSameTime) disableReason = '해당 시간에 다른 미팅이 있습니다';

          return { isDisabled, disableReason, isAlreadyPaired, pairedInfo };
        };

        const renderSelectedLabel = () => {
          if (!value) return '-- 기업을 검색/선택하세요 --';
          const opt = options.find(o => o.id === value);
          if (!opt) return '-- 기업을 검색/선택하세요 --';
          return `${opt.name} ${opt.booth ? `(${opt.booth})` : ''}`;
        };

        return (
          <>
            <div ref={wrapperRef} onClick={handleOpen} className="w-full p-3 border border-orange-300 rounded-lg outline-none font-bold text-sm bg-white shadow-sm flex items-center justify-between cursor-pointer">

              <span className="text-[10px] opacity-50 shrink-0">▼</span>
            </div>
            
            {isOpen && ReactDOM.createPortal(
              <div 
                ref={dropdownRef}
                className="fixed z-[999999] bg-white border border-gray-400 shadow-2xl rounded-lg flex flex-col" 
                style={{ top: pos.top, bottom: pos.bottom, left: pos.left, width: pos.width, maxHeight: '300px' }}
              >
                <div className="p-2 border-b bg-orange-50 sticky top-0 z-10 rounded-t-lg">
                  <input type="text" className="w-full p-2 border border-orange-300 rounded text-sm focus:outline-none focus:border-orange-500 font-bold bg-white" placeholder="🔍 기업명 검색..." value={search} onChange={e => setSearch(e.target.value)} onClick={e => e.stopPropagation()} autoFocus />
                </div>
                <div className="overflow-y-auto custom-scrollbar flex-1 bg-white rounded-b-lg">
                  <div onClick={() => { onChange(''); setIsOpen(false); }} className="p-3 text-sm cursor-pointer hover:bg-gray-100 text-gray-700 font-bold border-b">
                    ✕ 선택 비우기
                  </div>
                  {options.filter(opt => {
                    return (opt.name || '').toLowerCase().includes(search.toLowerCase());
                  }).map(opt => {
                    const { isDisabled, disableReason, isAlreadyPaired, pairedInfo } = getOptionState(opt);
                    const isCurrentlySelected = value === opt.id;

// =========================================================================
    // 행사 기본 설정 앱 (EventSetupApp)
    // =========================================================================
    function EventSetupApp({ eventData, saveEventData, onBack, onHome }) {
      const [eventName, setEventName] = useState(eventData?.eventName || '');
      const [config, setConfig] = useState(eventData?.config || {});

      useEffect(() => {
        if (config.dates && config.dates.length !== config.days) {
          const newDates = [...config.dates];
          const getToday = () => new Date().toISOString().split('T')[0];
          while (newDates.length < config.days) newDates.push(getToday());
          while (newDates.length > config.days) newDates.pop();
          setConfig({ ...config, dates: newDates });
        }
      }, [config.days]);

      const handleSave = () => {
        if (!eventName.trim()) return alert("행사명을 입력해주세요.");
        const newEv = JSON.parse(JSON.stringify(eventData));
        newEv.eventName = eventName;
        newEv.config = config;
        newEv.lastModified = Date.now();
        saveEventData(newEv);
        alert('행사 기본 설정이 저장되었습니다.');
        onBack();
      };

      return (
        <div className="flex flex-col h-full bg-slate-200 items-center">

                  <p className="text-xs text-gray-500 mt-2 font-bold">* 엔터(줄바꿈) 또는 쉼표(,)로 구분됩니다. 엑셀의 열을 그대로 복사해서 대량으로 등록할 수 있습니다.</p>

                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="space-y-5">

                        <label className="block text-sm font-bold text-gray-700 mb-2">1일 세션 수</label>
                        <input type="number" min="1" value={config.sessionsPerDay || 10} onChange={e => setConfig({...config, sessionsPerDay: parseInt(e.target.value) || 1})} className="w-full p-3 border border-gray-300 rounded-lg outline-none focus:border-blue-500 font-bold" />
                      </div>
                      <div>
                        <label className="block text-sm font-bold text-gray-700 mb-2">바이어 최소 매칭 수</label>
                        <input type="number" min="0" value={config.minMatches !== undefined ? config.minMatches : 3} onChange={e => setConfig({...config, minMatches: parseInt(e.target.value) || 0})} className="w-full p-3 border border-blue-200 rounded-lg outline-none focus:border-blue-500 bg-blue-50 font-bold" />
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4 bg-orange-50 p-4 rounded-xl border border-orange-200">
                      <div>
                        <label className="block text-sm font-bold text-orange-800 mb-2">점심 시작</label>
                        <input type="time" value={config.lunchStart || '12:00'} onChange={e => setConfig({...config, lunchStart: e.target.value})} className="w-full p-2.5 border border-orange-200 rounded-lg outline-none focus:border-orange-500 font-bold" />
                      </div>
                      <div>
                        <label className="block text-sm font-bold text-orange-800 mb-2">점심 종료</label>
                        <input type="time" value={config.lunchEnd || '13:00'} onChange={e => setConfig({...config, lunchEnd: e.target.value})} className="w-full p-2.5 border border-orange-200 rounded-lg outline-none focus:border-orange-500 font-bold" />
                      </div>
                    </div>
                  </div>
                </div>
                
                <div className="pt-6 border-t border-gray-100 flex justify-end">
                  <button onClick={handleSave} className="px-8 py-3 bg-blue-600 text-white font-black rounded-xl shadow-lg hover:bg-blue-700 transition active:scale-95 text-lg">
                    저장 후 닫기
                  </button>
                </div>
              </div>
            </main>
          </div>
        </div>
      );
    }
    // =========================================================================
    // 4. 메인 허브 라우터 (Main Router)
    // =========================================================================
    function App() {
      // --- 🔒 새롭게 추가된 비밀번호 인증 상태 ---
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [passwordInput, setPasswordInput] = useState('');
      const [authError, setAuthError] = useState('');

      const handleLogin = (e) => {
        e.preventDefault();
        // 설정하신 비밀번호: yeon1234
        if (passwordInput === 'yeon1234') {
          setIsAuthenticated(true);
          setAuthError('');
        } else {
          setAuthError('비밀번호가 일치하지 않습니다.');
        }
      };

      const [eventsDB, setEventsDB] = useState({});
      const [eventId, setEventId] = useState('');
      const [loading, setLoading] = useState(true);
      const [selectedMenu, setSelectedMenu] = useState(''); 

      const getToday = () => new Date().toISOString().split('T')[0];

      // 특정 행사 삭제 기능
      const handleDeleteEvent = (e, id) => {
        e.stopPropagation(); // 행사 카드로 잘못 입장되는 거 방지
        const eventName = eventsDB[id]?.eventName || '이 행사';
        if (confirm(`⚠️ 경고 ⚠️\n\n'${eventName}'를(을) 정말 삭제하시겠습니까?\n삭제된 데이터는 영구적으로 복구할 수 없습니다!!!`)) {
          setEventsDB(prev => {
            const newDB = { ...prev };
            delete newDB[id];
            // 구글 스프레드시트(서버)에도 반영 (포맷 맞춤)
            fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'save_events', data: newDB }) }).catch(console.error);
            return newDB;
          });
          alert('삭제가 완료되었습니다.');
        }
      };

      const createNewEvent = () => {
        const newId = 'event_' + Date.now();
        const newData = {
          id: newId, eventName: '새 비즈니스 매칭데이',
          config: { days: 1, dates: [getToday()], startTime: '10:00', sessionLength: 30, sessionsPerDay: 10, lunchStart: '12:00', lunchEnd: '13:00', minMatches: 3, fieldsText: 'IT/소프트웨어, 기계/제조, 뷰티/화장품, 식품/의료, 기타' },
          companies: [], buyers: [], matches: { 0: {} }, walkInMatches: [], distributionData: { companies: {}, buyers: {} }, liveStatus: {}, meetingResults: {}, floorPlan: { cols: 10, rows: 8, tables: [] },
          mailConfig: { eventDate: '', meetingDate: '', replyDeadline: getToday(), adminOffice: '수출상담회 운영사무국', senderName: '담당자명', subjectLine: '[초안 공유] 수출 상담회 스케줄 공유', language: 'KO', buyerProfileLink: '' },
          lastModified: Date.now()
        };
        setEventsDB(prev => {
          const newDB = {...prev, [newId]: newData};
          fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'save_events', data: newDB }) }).catch(console.error);
          return newDB;
        });
        setEventId(newId);
        setSelectedMenu('setup'); // 생성 후 바로 기본 설정 모드로 이동
      };      

      const goHome = () => {
        setEventId('');
        setSelectedMenu('');
      };

      useEffect(() => {
        const fetchAll = () => {
          fetch(`${GAS_URL}?t=${new Date().getTime()}`, { cache: 'no-store' })
            .then(res => res.json())
            .then(responseData => {
              // ★ 핵심: 서버에서 준 데이터 중 events 객체만 추출
              const data = responseData.events || {};
              delete data.__accounts;

              Object.keys(data).forEach(evtId => {
                const ev = data[evtId];
                if (!ev || typeof ev !== 'object') return; 
                if (ev.matches) {
                  Object.keys(ev.matches).forEach(day => {
                    Object.keys(ev.matches[day]).forEach(rawTime => {
                      if (rawTime.includes('현장') || rawTime.includes('추가')) {
                        if (!ev.onsiteMarks) ev.onsiteMarks = {};
                        if (!ev.onsiteMarks[day]) ev.onsiteMarks[day] = {};
                        if (!ev.onsiteMarks[day][rawTime]) ev.onsiteMarks[day][rawTime] = {};
                        Object.keys(ev.matches[day][rawTime]).forEach(cId => {
                           ev.onsiteMarks[day][rawTime][cId] = true;
                        });
                      }
                    });
                  });
                }
              });
              
              setEventsDB(prev => {
                if (Object.keys(prev).length === 0) return data; 
                
                if (eventId && prev[eventId] && data[eventId]) {
                  if (data[eventId].lastModified > (prev[eventId].lastModified || 0)) {
                    console.log("다른 사용자의 수정 사항이 반영되었습니다.");
                    return data; 
                  }
                }
                return prev;
              });
              setLoading(false);
            }).catch(err => {
              console.error(err);
              setLoading(false);
            });
        };

        // 인증된 상태에서만 데이터를 불러오도록 조건 추가 (선택 사항)
        if (isAuthenticated) {
            fetchAll(); 
            const intervalId = setInterval(fetchAll, 5000); 
            return () => clearInterval(intervalId); 
        }
      }, [eventId, isAuthenticated]); 

      const saveEventData = (updatedEvent) => {
        setEventsDB(prevDB => {
          const newDB = { ...prevDB, [eventId]: updatedEvent };
          fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'save_events', data: newDB }) }).catch(console.error);
          return newDB;
        });
      };

      const fileInputRef = useRef(null);

      const handleDownloadBackup = (e, id) => {
        e.stopPropagation(); 
        const eventData = eventsDB[id];
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(eventData, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", `B2B_Backup_${eventData.eventName || 'event'}.json`);
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
      };

      const handleUploadBackup = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const importedData = JSON.parse(event.target.result);
            if (!importedData.eventName) throw new Error("유효한 B2B 행사 백업 파일이 아닙니다.");

            const newEventId = `evt_${Date.now()}`; 
            importedData.lastModified = Date.now();

            setEventsDB(prevDB => {
              const newDB = { ...prevDB, [newEventId]: importedData };
              fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'save_events', data: newDB }) }).catch(console.error);
              return newDB;
            });
            alert(`'${importedData.eventName}' 행사가 백업 파일로부터 성공적으로 추가되었습니다!`);
          } catch (err) {
            alert("파일을 읽는 중 오류가 발생했습니다: " + err.message);
          }
          e.target.value = ''; 
        };
        reader.readAsText(file);
      };

      // ---------------------------------------------------------
      // 🔒 인증되지 않았을 때 보여주는 화면 (로그인 창)
      // ---------------------------------------------------------
      if (!isAuthenticated) {
        return (
          <div className="flex flex-col h-screen bg-slate-200 items-center justify-center p-6">
            <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center bottom-sheet">
              <div className="w-16 h-16 bg-blue-700 text-white rounded-2xl flex items-center justify-center font-black text-2xl mx-auto mb-4 shadow-lg">B2B</div>
              <h1 className="text-2xl font-black text-slate-800 mb-2">통합 관리 포털</h1>
              <p className="text-sm font-bold text-slate-500 mb-6">관리자 비밀번호를 입력해주세요.</p>
              
              <form onSubmit={handleLogin} className="space-y-4">
                <input
                  type="password"
                  value={passwordInput}
                  onChange={(e) => setPasswordInput(e.target.value)}
                  placeholder="비밀번호 입력"
                  className="w-full p-3 border border-gray-300 rounded-xl focus:border-blue-500 focus:ring-2 outline-none text-center font-bold transition"
                  autoFocus
                />
                {authError && <p className="text-red-500 text-xs font-bold">{authError}</p>}
                <button type="submit" className="w-full py-3 bg-blue-600 text-white font-black rounded-xl shadow-md hover:bg-blue-700 transition active:scale-95">
                  입장하기
                </button>
              </form>
            </div>
          </div>
        );
      }

      // --- 이후부터는 기존 로직과 동일 ---
      if (loading) return <div className="flex h-screen items-center justify-center font-bold text-blue-600 text-lg animate-pulse">B2B 통합 포털 로드 중...</div>;

      if (!eventId) {
        return (
          <div className="flex flex-col h-screen bg-slate-100 items-center justify-center p-6 overflow-y-auto relative">
          <input type="file" accept=".json" ref={fileInputRef} onChange={handleUploadBackup} style={{ display: 'none' }} />
            <div className="absolute top-6 right-6 flex gap-3">
              <button onClick={createNewEvent} className="flex items-center px-4 py-2 bg-blue-600 text-white font-bold text-sm rounded-xl shadow-md hover:bg-blue-700 transition">
                <IconPlus size={16} className="mr-1.5" /> 새 행사 만들기
              </button>
              <button onClick={() => fileInputRef.current.click()} className="flex items-center px-4 py-2 bg-slate-800 text-white font-bold text-sm rounded-xl shadow-md hover:bg-black transition">
                <IconPlus size={16} className="mr-1.5" /> JSON 백업 복원
              </button>
            </div>

            <div className="text-center mb-12">
              <div className="w-20 h-20 bg-blue-700 text-white rounded-[2rem] flex items-center justify-center font-black text-3xl mx-auto mb-6 shadow-xl border-4 border-white">B2B</div>
              <h1 className="text-4xl font-black text-slate-800 mb-3 tracking-tight">브릿징 통합 관리 포털</h1>
              <p className="text-slate-500 font-bold text-lg">진행하실 프로젝트(행사)를 선택해 주세요.</p>
            </div>            
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-5xl w-full pb-10">
              {Object.keys(eventsDB).sort((a,b) => (eventsDB[b].lastModified||0) - (eventsDB[a].lastModified||0)).map(id => (
                <div key={id} onClick={() => setEventId(id)} className="bg-white p-6 rounded-3xl shadow-sm hover:shadow-xl cursor-pointer border-2 border-transparent hover:border-blue-500 transition-all hover:-translate-y-1.5 flex flex-col h-full group">
                  <div className="flex-1 flex justify-between items-start">
                    <div>
                      <h2 className="text-xl font-black text-slate-800 mb-2 leading-tight group-hover:text-blue-700 transition-colors pr-2">{eventsDB[id].eventName}</h2>
                      <div className="flex gap-2 mt-4 text-xs font-bold text-slate-500">
                        <span className="bg-slate-50 px-2.5 py-1.5 rounded-lg border border-gray-100">기업 {eventsDB[id].companies?.length || 0}</span>
                        <span className="bg-slate-50 px-2.5 py-1.5 rounded-lg border border-gray-100">바이어 {eventsDB[id].buyers?.length || 0}</span>
                      </div>
                    </div>
                    <div className="flex">
                      <button onClick={(e) => handleDownloadBackup(e, id)} className="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition border border-transparent hover:border-blue-200" title="JSON 백업 파일 다운로드">
                        <IconDownload size={18} />
                      </button>
                      <button onClick={(e) => handleDeleteEvent(e, id)} className="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition border border-transparent hover:border-red-200 ml-1" title="행사 영구 삭제">
                        <IconTrash size={18} />
                      </button>
                    </div>
                  </div>
                  <div className="mt-6 flex items-center justify-end text-blue-600 font-bold text-sm group-hover:translate-x-1 transition-transform">입장 <IconArrowRight size={18} className="ml-1" /></div>
                </div>
              ))}
              {Object.keys(eventsDB).length === 0 && <div className="col-span-full text-center py-20 text-gray-400 font-bold bg-white rounded-3xl border-2 border-dashed">행사 데이터가 없습니다. 관리자 사이트에서 먼저 행사를 생성해주세요.</div>}
            </div>
          </div>
        );
      }

      if (!selectedMenu) {
        return (
          <div className="flex flex-col h-screen bg-slate-50 overflow-hidden items-center">
             <header className="w-full bg-white px-6 py-4 shadow-sm border-b flex flex-wrap gap-4 items-center justify-between z-10 shrink-0">
                <div className="flex items-center gap-4">
                  <button onClick={() => setEventId('')} className="p-2.5 bg-gray-100 hover:bg-gray-200 rounded-full transition text-gray-600"><IconArrowLeft size={20} /></button>
                  <h1 className="text-2xl font-black text-gray-900 truncate max-w-sm sm:max-w-xl">{eventsDB[eventId].eventName}</h1>
                </div>
                <div className="flex items-center gap-4">
                   <div className="px-4 py-2 bg-blue-50 border border-blue-200 text-blue-700 font-black text-sm rounded-xl shadow-sm hidden sm:block">통합 허브 모드</div>
                   <button onClick={() => setSelectedMenu('setup')} className="px-4 py-2 bg-slate-800 text-white font-bold text-sm rounded-xl shadow-sm hover:bg-black transition flex items-center">
                      <IconSettings size={16} className="mr-1.5" /> 행사 기본설정 수정
                   </button>
                   <GlobalNavButtons onHomeClick={goHome} onStatusClick={() => setSelectedMenu('status')} />
                </div>
             </header>
             <div className="w-full flex-1 overflow-y-auto p-4 sm:p-8 flex flex-col items-center justify-center custom-scrollbar">
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 max-w-5xl w-full">
                   
                   <div onClick={() => setSelectedMenu('onsite')} className="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-200 hover:border-orange-500 hover:shadow-xl cursor-pointer transition-all hover:-translate-y-2 flex flex-col items-center text-center gap-5 group relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-full h-1.5 bg-orange-500"></div>
                      <div className="w-20 h-20 bg-orange-50 text-orange-600 rounded-3xl flex items-center justify-center text-4xl group-hover:bg-orange-600 group-hover:text-white transition-all shadow-inner">⚡</div>
                      <div>
                        <h3 className="font-black text-xl text-orange-900 mb-1.5">현장 즉석 미팅</h3>
                        <p className="text-xs text-gray-500 font-bold">시간순 전체 스케줄 확인 및 현장 추가</p>
                      </div>
                   </div>
                 
  <div onClick={() => setSelectedMenu('live')} className="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-200 hover:border-red-500 hover:shadow-xl cursor-pointer transition-all hover:-translate-y-2 flex flex-col items-center text-center gap-5 group">
                      <div className="w-20 h-20 bg-red-50 text-red-600 rounded-3xl flex items-center justify-center group-hover:bg-red-600 group-hover:text-white transition-all"><IconRadio size={36}/></div>
                      <div>
                        <h3 className="font-black text-xl text-red-900 mb-1.5">현장 운영 관리</h3>
                        <p className="text-xs text-gray-500 font-bold">실시간 미팅 목록 및 배치도</p>
                      </div>
                   </div>

                   <div onClick={() => setSelectedMenu('company')} className="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-200 hover:border-green-500 hover:shadow-xl cursor-pointer transition-all hover:-translate-y-2 flex flex-col items-center text-center gap-5 group">
                      <div className="w-20 h-20 bg-green-50 text-green-600 rounded-3xl flex items-center justify-center group-hover:bg-green-600 group-hover:text-white transition-all"><IconUser size={36}/></div>
                      <div>
                        <h3 className="font-black text-xl text-green-900 mb-1.5">국내 기업 관리</h3>
                        <p className="text-xs text-gray-500 font-bold">참가 기업 목록 및 분야 설정</p>
                      </div>
                   </div>

                   <div onClick={() => setSelectedMenu('buyer')} className="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-200 hover:border-purple-500 hover:shadow-xl cursor-pointer transition-all hover:-translate-y-2 flex flex-col items-center text-center gap-5 group">
                      <div className="w-20 h-20 bg-purple-50 text-purple-600 rounded-3xl flex items-center justify-center group-hover:bg-purple-600 group-hover:text-white transition-all"><IconUser size={36}/></div>
                      <div>
                        <h3 className="font-black text-xl text-purple-900 mb-1.5">참가 바이어 관리</h3>
                        <p className="text-xs text-gray-500 font-bold">해외 바이어 목록 및 희망 기업</p>
                      </div>
                   </div>

                   <div onClick={() => setSelectedMenu('matching')} className="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-200 hover:border-indigo-500 hover:shadow-xl cursor-pointer transition-all hover:-translate-y-2 flex flex-col items-center text-center gap-5 group">
                      <div className="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center group-hover:bg-indigo-600 group-hover:text-white transition-all"><IconCalendarDays size={36}/></div>
                      <div>
                        <h3 className="font-black text-xl text-indigo-900 mb-1.5">매칭 테이블 편집</h3>
                        <p className="text-xs text-gray-500 font-bold">시간대별 바이어 ↔ 기업 매칭</p>
                      </div>
                   </div>
                   
                   <div onClick={() => setSelectedMenu('distribution')} className="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-200 hover:border-emerald-500 hover:shadow-xl cursor-pointer transition-all hover:-translate-y-2 flex flex-col items-center text-center gap-5 group">
                      <div className="w-20 h-20 bg-emerald-50 text-emerald-600 rounded-3xl flex items-center justify-center group-hover:bg-emerald-600 group-hover:text-white transition-all"><IconSend size={36}/></div>
                      <div>
                        <h3 className="font-black text-xl text-emerald-900 mb-1.5">스케줄 배포 현황판</h3>
                        <p className="text-xs text-gray-500 font-bold">배포 후 변경사항 추적 관리</p>
                      </div>
                   </div>

                   <div onClick={() => setSelectedMenu('status')} className="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-200 hover:border-blue-500 hover:shadow-xl cursor-pointer transition-all hover:-translate-y-2 flex flex-col items-center text-center gap-5 group">
                      <div className="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition-all"><IconMap size={36}/></div>
                      <div>
                        <h3 className="font-black text-xl text-blue-900 mb-1.5">매칭 현황판</h3>
                        <p className="text-xs text-gray-500 font-bold">대시보드 뷰 및 엑셀 다운로드</p>
                      </div>
                   </div>

                   <div onClick={() => setSelectedMenu('export')} className="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-200 hover:border-purple-500 hover:shadow-xl cursor-pointer transition-all hover:-translate-y-2 flex flex-col items-center text-center gap-5 group">
                      <div className="w-20 h-20 bg-purple-50 text-purple-600 rounded-3xl flex items-center justify-center group-hover:bg-purple-600 group-hover:text-white transition-all"><IconDownload size={36}/></div>
                      <div>
                        <h3 className="font-black text-xl text-purple-900 mb-1.5">대장 다운로드</h3>
                        <p className="text-xs text-gray-500 font-bold">개별/일괄 스케줄 및 엑셀 추출</p>
                      </div>
                   </div>

                </div>
             </div>
          </div>
        );
      }

     return (
        <div className="w-full h-screen overflow-hidden">
           {selectedMenu === 'setup' && <EventSetupApp eventData={eventsDB[eventId]} saveEventData={saveEventData} onBack={() => setSelectedMenu('')} onHome={goHome} />}

           {selectedMenu === 'status' && <StatusBoardApp eventData={eventsDB[eventId]} onBack={() => setSelectedMenu('')} onHome={goHome} setSelectedMenu={setSelectedMenu} />}
           {selectedMenu === 'interpreter' && <MasterApp eventData={eventsDB[eventId]} saveEventData={saveEventData} initialTab="interpreter" setSelectedMenu={setSelectedMenu} onBack={() => setSelectedMenu('')} onHome={goHome} onStatusClick={() => setSelectedMenu('status')} />}
           {selectedMenu === 'live' && <MasterApp eventData={eventsDB[eventId]} saveEventData={saveEventData} initialTab="live" setSelectedMenu={setSelectedMenu} onBack={() => setSelectedMenu('')} onHome={goHome} onStatusClick={() => setSelectedMenu('status')} />}
           {selectedMenu === 'matching' && <MasterApp eventData={eventsDB[eventId]} saveEventData={saveEventData} initialTab="schedule" setSelectedMenu={setSelectedMenu} onBack={() => setSelectedMenu('')} onHome={goHome} onStatusClick={() => setSelectedMenu('status')} />}
           {selectedMenu === 'export' && <MasterApp eventData={eventsDB[eventId]} saveEventData={saveEventData} initialTab="export" setSelectedMenu={setSelectedMenu} onBack={() => setSelectedMenu('')} onHome={goHome} onStatusClick={() => setSelectedMenu('status')} />}
           {selectedMenu === 'distribution' && <MasterApp eventData={eventsDB[eventId]} saveEventData={saveEventData} initialTab="distribution" setSelectedMenu={setSelectedMenu} onBack={() => setSelectedMenu('')} onHome={goHome} onStatusClick={() => setSelectedMenu('status')} />}
           {selectedMenu === 'onsite' && <OnsiteApp eventData={eventsDB[eventId]} saveEventData={saveEventData} setSelectedMenu={setSelectedMenu} onBack={() => setSelectedMenu('')} onHome={goHome} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
